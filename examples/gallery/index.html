<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>modelicons gallery</title>
    <style>
      :root {
        --bg: #0b0b0c;
        --fg: #f5f5f7;
        --muted: #8b8b8f;
        --card: #18181b;
        --card-hover: #232327;
        --accent: #5eead4;
        --border: rgba(255, 255, 255, 0.06);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #fafafa;
          --fg: #18181b;
          --muted: #71717a;
          --card: #ffffff;
          --card-hover: #f4f4f5;
          --accent: #0d9488;
          --border: rgba(0, 0, 0, 0.06);
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #root { padding: 24px; max-width: 1200px; margin: 0 auto; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
